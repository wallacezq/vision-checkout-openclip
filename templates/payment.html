<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment — Automatic Vision-based Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #12141c;
      --panel:     #1a1d2e;
      --card:      #21253a;
      --card-h:    #272b42;
      --border:    #2e3350;
      --accent:    #4f6ef7;
      --accent-h:  #6b85ff;
      --green:     #3ecf8e;
      --red:       #f76e6e;
      --text:      #e8eaf6;
      --muted:     #8891b8;
      --radius-lg: 20px;
      --radius:    14px;
      --radius-sm: 9px;
      --font:      'Nunito', sans-serif;
      --font-body: 'Nunito Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .payment-container {
      background: var(--panel);
      padding: 36px 32px;
      border-radius: var(--radius-lg);
      box-shadow: 0 32px 80px rgba(0,0,0,0.55);
      width: 400px;
      max-width: 100%;
    }

    .pay-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .pay-header .icon-badge {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 9px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .pay-header h2 {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .amount-display {
      text-align: center;
      padding: 18px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
    }
    .amount-display .label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 4px;
    }
    .amount-display .value {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input::placeholder { color: var(--muted); opacity: 0.6; }
    .form-group input:focus { border-color: var(--accent); }

    .form-group small.error {
      display: none;
      font-size: 0.72rem;
      color: var(--red);
      margin-top: 4px;
      font-family: var(--font-body);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card-type {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      min-height: 20px;
      margin-bottom: 8px;
    }

    .pay-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 15px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .pay-btn:hover { background: var(--accent-h); }
    .pay-btn:active { transform: scale(0.98); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="payment-container">
    <div class="pay-header">
      <div class="icon-badge">💳</div>
      <h2>Complete Your Payment</h2>
    </div>

    <div class="amount-display">
      <div class="label">Total Amount</div>
      <div class="value" id="payAmount">RM 0.00</div>
    </div>

    <div class="form-group">
      <label for="cardNumber">Card Number</label>
      <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" autocomplete="cc-number"/>
      <small class="error" id="cardError"></small>
    </div>

    <p class="card-type" id="cardType"></p>

    <div class="form-row">
      <div class="form-group">
        <label for="expiry">Expiry Date</label>
        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" autocomplete="cc-exp"/>
        <small class="error" id="expiryError"></small>
      </div>
      <div class="form-group">
        <label for="cvv">CVV</label>
        <input type="password" id="cvv" placeholder="123" maxlength="4" autocomplete="cc-csc"/>
        <small class="error" id="cvvError"></small>
      </div>
    </div>

    <button class="pay-btn" onclick="confirmPayment()">Pay Now</button>
    <a class="back-link" href="/">← Back to checkout</a>
  </div>

  <script>
    // Display amount from URL
    const params = new URLSearchParams(window.location.search);
    const amount = params.get('amount');
    if (amount) document.getElementById('payAmount').textContent = 'RM ' + parseFloat(amount).toFixed(2);

    const cardInput = document.getElementById("cardNumber");
    const expiryInput = document.getElementById("expiry");
    const cvvInput = document.getElementById("cvv");
    const cardType = document.getElementById("cardType");

    cardInput.addEventListener("input", function (e) {
      let value = e.target.value.replace(/\D/g, "").substring(0, 16);
      e.target.value = value.replace(/(.{4})/g, "$1 ").trim();

      const firstDigit = value[0];
      if (firstDigit === "4") cardType.textContent = "Visa";
      else if (firstDigit === "5") cardType.textContent = "MasterCard";
      else if (firstDigit === "3") cardType.textContent = "American Express";
      else cardType.textContent = "";
    });

    expiryInput.addEventListener("input", function (e) {
      let value = e.target.value.replace(/\D/g, "").substring(0, 4);
      if (value.length > 2) value = value.substring(0, 2) + "/" + value.substring(2);
      e.target.value = value;
    });

    cvvInput.addEventListener("input", function (e) {
      e.target.value = e.target.value.replace(/\D/g, "").substring(0, 4);
    });

    function confirmPayment() {
      const cardNumber = cardInput.value.trim();
      const expiry = expiryInput.value.trim();
      const cvv = cvvInput.value.trim();

      const cardValid = cardNumber.replace(/\s/g, "").length === 16;
      const expiryValid = /^\d{2}\/\d{2}$/.test(expiry);
      const cvvValid = /^\d{3,4}$/.test(cvv);

      document.querySelectorAll('small.error').forEach(el => el.style.display = 'none');

      let isValid = true;

      if (!cardValid) {
        document.getElementById("cardError").textContent = "Invalid card number";
        document.getElementById("cardError").style.display = "block";
        isValid = false;
      }

      if (!expiryValid) {
        document.getElementById("expiryError").textContent = "Invalid expiry (MM/YY)";
        document.getElementById("expiryError").style.display = "block";
        isValid = false;
      }

      if (!cvvValid) {
        document.getElementById("cvvError").textContent = "Invalid CVV";
        document.getElementById("cvvError").style.display = "block";
        isValid = false;
      }

      if (!isValid) return;

      window.location.href = "/payment/success";
    }
  </script>
</body>
</html>
