<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Success — Automatic Vision-based Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #12141c;
      --panel:     #1a1d2e;
      --card:      #21253a;
      --border:    #2e3350;
      --accent:    #4f6ef7;
      --accent-h:  #6b85ff;
      --green:     #3ecf8e;
      --text:      #e8eaf6;
      --muted:     #8891b8;
      --radius-lg: 20px;
      --radius:    14px;
      --radius-sm: 9px;
      --font:      'Nunito', sans-serif;
      --font-body: 'Nunito Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .success-container {
      background: var(--panel);
      padding: 48px 36px;
      border-radius: var(--radius-lg);
      box-shadow: 0 32px 80px rgba(0,0,0,0.55);
      width: 420px;
      max-width: 100%;
      text-align: center;
    }

    .success-icon {
      width: 72px; height: 72px;
      background: rgba(62,207,142,0.12);
      border: 2px solid rgba(62,207,142,0.3);
      border-radius: 50%;
      display: grid; place-items: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }

    h2 {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--green);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    p {
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .back-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 15px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .back-btn:hover { background: var(--accent-h); }
    .back-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="success-icon">✓</div>
    <h2>Payment Successful!</h2>
    <p>Thank you for your purchase. Your transaction has been completed.</p>
    <button class="back-btn" onclick="window.location.href='/'">Back to Home</button>
  </div>
</body>
</html>
